<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم استلام طلبك</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '536244607937266');
fbq('track', 'PageView');
</script>

<style>
body{
  font-family:'Cairo',sans-serif;
  margin:0;
  background:
    radial-gradient(circle at top right, rgba(91,191,138,.14), transparent 24%),
    radial-gradient(circle at top left, rgba(255,155,0,.10), transparent 18%),
    linear-gradient(180deg,#fbf8f1 0%, #f5f1e7 100%);
}

.container{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:35px 25px;
  border-radius:28px;
  box-shadow:0 25px 60px rgba(0,0,0,.12);
  text-align:center;
}

.icon{
  font-size:70px;
  margin-bottom:10px;
}

h1{
  margin:10px 0;
  font-size:32px;
}

p{
  color:#555;
  line-height:1.9;
  font-weight:700;
}

.status-box{
  background:#f9fbf7;
  border:1px solid #e2eee7;
  padding:18px;
  border-radius:18px;
  margin-top:20px;
}

.status-box div{
  margin:6px 0;
  font-weight:800;
}

.highlight{
  margin-top:20px;
  padding:16px;
  background:#fff7ed;
  border:1px solid #ffd9b2;
  border-radius:18px;
  font-weight:900;
  color:#8a4d00;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:15px 22px;
  border-radius:14px;
  background:linear-gradient(135deg,#5bbf8a,#399d6d);
  color:#fff;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 14px 28px rgba(57,157,109,.25);
}

.order-summary{
  margin-top:20px;
  background:#fff;
  border:1px solid #ece5d7;
  padding:18px;
  border-radius:18px;
  text-align:right;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-weight:800;
}

.total{
  font-size:20px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="icon">🎉</div>

<h1>تم استلام طلبك بنجاح</h1>

<p>
شكرًا لك ❤️  
طلبك الآن قيد المراجعة وسيتم التواصل معك خلال وقت قصير لتأكيد الطلب.
</p>

<div class="status-box">
<div>📞 تأكد من الرد على هاتفك</div>
<div>🚚 سيتم تحديد موعد التوصيل معك</div>
<div>💵 الدفع عند الاستلام</div>
</div>

<div id="orderSummary" class="order-summary" style="display:none">
<h3 style="margin-bottom:10px;">📦 تفاصيل طلبك</h3>

<div class="row">
<span>الكمية</span>
<span id="qty"></span>
</div>

<div class="row">
<span>المنطقة</span>
<span id="region"></span>
</div>

<div class="row total">
<span>المجموع</span>
<span id="total"></span>
</div>

</div>

<div class="highlight">
🔥 سيتم التواصل معك خلال دقائق لتأكيد الطلب قبل الشحن
</div>

<a href="index.html" class="btn">العودة للرئيسية</a>

</div>

</div>

<script>

// 📊 جلب البيانات
const order = JSON.parse(localStorage.getItem("talkingBirdOrderData") || "{}");

if(order.total){

  document.getElementById("orderSummary").style.display = "block";

  document.getElementById("qty").innerText =
    order.quantity == 2 ? "قطعتان" : "حبة واحدة";

  document.getElementById("region").innerText = order.region;

  document.getElementById("total").innerText = order.total + " شيكل";

  // 🔥 Facebook Purchase
  fbq('track', 'Purchase', {
    value: order.total,
    currency: 'ILS'
  });
}

// تنظيف
localStorage.removeItem("talkingBirdOrderData");

</script>

</body>
</html>
