<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<script>

<style>
body{
  font-family:'Cairo',sans-serif;
  background:#f6f3eb;
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card{
  background:#fff;
  padding:40px 25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.1);
  max-width:500px;
  width:90%;
}

.icon{
  font-size:70px;
  margin-bottom:15px;
}

h1{
  margin-bottom:10px;
}

p{
  color:#555;
  line-height:1.8;
  font-weight:700;
}

.box{
  background:#f9fbf7;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
  font-size:14px;
}

.btn{
  margin-top:20px;
  display:inline-block;
  padding:14px 20px;
  background:#5bbf8a;
  color:#fff;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
}
</style>
</head>

<body>

<div class="card">

<div class="icon">✅</div>

<h1>تم استلام طلبك بنجاح</h1>

<p>
شكرًا لك ❤️  
تم تسجيل طلبك وسيتم التواصل معك قريبًا لتأكيد الطلب والتوصيل.
</p>

<div class="box">
📞 تأكد من أن هاتفك متاح للرد  
🚚 سيتم تحديد موعد التوصيل معك  
💵 الدفع عند الاستلام
</div>

<a href="index.html" class="btn">العودة للصفحة الرئيسية</a>

</div>

<script>

// 🔥 إرسال Purchase من البيانات المخزنة
const order = JSON.parse(localStorage.getItem("talkingBirdOrderData") || "{}");

if(order.total){
  fbq('track', 'Purchase', {
    value: order.total,
    currency: 'ILS'
  });
}

// 🧹 تنظيف البيانات بعد الإرسال
localStorage.removeItem("talkingBirdOrderData");
localStorage.removeItem("talkingBirdOrderStatus");

</script>

</body>
</html>
