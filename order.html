<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إتمام الطلب | لعبة العصفور الناطق</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Cairo',sans-serif;
      margin:0;
      background:#f6f3eb;
      color:#111;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    input,select,textarea{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#5bbf8a;
      color:#fff;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
    }

    .summary{
      margin-top:20px;
      padding:15px;
      background:#f9fbf7;
      border-radius:14px;
      font-weight:700;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>إتمام الطلب</h1>

    <form id="orderForm">
      <input type="text" name="name" placeholder="الاسم الكامل" required>
      <input type="tel" name="phone" placeholder="رقم الهاتف" required>
      <input type="text" name="city" placeholder="المدينة" required>

      <select name="region" id="region">
        <option value="">اختر المنطقة</option>
        <option value="الضفة" data-price="20">الضفة - 20 شيكل</option>
        <option value="القدس" data-price="30">القدس - 30 شيكل</option>
        <option value="الداخل" data-price="70">الداخل - 70 شيكل</option>
      </select>

      <input type="text" name="address" placeholder="العنوان" required>

      <select name="quantity" id="quantity">
        <option value="1">حبة - 49 شيكل</option>
        <option value="2">قطعتين - 80 شيكل</option>
      </select>

      <textarea name="notes" placeholder="ملاحظات (اختياري)"></textarea>

      <button type="submit" id="submitBtn">إرسال الطلب</button>
    </form>

    <div class="summary">
      <div>السعر: <span id="price">49</span> شيكل</div>
      <div>التوصيل: <span id="delivery">0</span></div>
      <div><strong>الإجمالي: <span id="total">49</span> شيكل</strong></div>
    </div>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNdJ5-6RZW1ZR8seLKKP7uHHdUFwbrgvVr8DnahyKym3emViE-HSXDBnaWnyS5NrwIYA/exec";

function calc(){
  const qty = document.getElementById("quantity").value;
  const region = document.getElementById("region");
  const delivery = region.selectedOptions[0]?.dataset.price || 0;

  const price = qty == 2 ? 80 : 49;
  const total = Number(price) + Number(delivery);

  document.getElementById("price").innerText = price;
  document.getElementById("delivery").innerText = delivery;
  document.getElementById("total").innerText = total;
}

document.getElementById("quantity").addEventListener("change", calc);
document.getElementById("region").addEventListener("change", calc);

async function send(order){
  await fetch(GOOGLE_SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(order)
  });
}

document.getElementById("orderForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "جاري الإرسال...";

  const form = e.target;

  const order = {
    name:form.name.value,
    phone:form.phone.value,
    city:form.city.value,
    address:form.address.value,
    quantity:form.quantity.value,
    region:form.region.value,
    notes:form.notes.value,
    total:document.getElementById("total").innerText,
    createdAt:new Date().toISOString()
  };

  await send(order);

  localStorage.setItem("talkingBirdOrderData", JSON.stringify(order));

  window.location.href="thank-you.html";
});
</script>

</body>
</html>
